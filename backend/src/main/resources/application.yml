server:
  port: 8080

spring:
  application:
    name: StatementIQ
  
  data:
    mongodb:
      uri: ${MONGODB_URI:}
  
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  threads:
    virtual:
      enabled: true

# Firebase Configuration
# Option 1 (Recommended): Point to your downloaded service account JSON file
firebase:
  service-account-path: ${FIREBASE_SERVICE_ACCOUNT_PATH:}
  # Option 2: Individual env vars (if not using the JSON file)
  project-id: ${FIREBASE_PROJECT_ID:}
  private-key: ${FIREBASE_PRIVATE_KEY:}
  client-email: ${FIREBASE_CLIENT_EMAIL:}

# Claude API Configuration
claude:
  api-key: ${ANTHROPIC_API_KEY:}
  api-url: https://api.anthropic.com/v1/messages
  model: claude-sonnet-4-20250514

# Gemini API Configuration
gemini:
  api-key: ${GEMINI_API_KEY:}
  model: gemini-3.1-pro-preview

# OpenAI API Configuration
openai:
  api-key: ${OPENAI_API_KEY:}
  model: gpt-4o-mini

# Razorpay Configuration
razorpay:
  key-id: ${RAZORPAY_KEY_ID:}
  key-secret: ${RAZORPAY_KEY_SECRET:}

# Rate Limiting
rate-limit:
  free-uploads-per-day: 5
  pro-uploads-per-day: 30

# CORS
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.statementiq: INFO
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
