version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7
    container_name: statementiq-db
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-statementiq_secure_pass}
      MONGO_INITDB_DATABASE: statementiq
    volumes:
      - mongodb_data:/data/db
    networks:
      - statementiq-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 30s
      timeout: 10s
      retries: 3

  # Spring Boot Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: statementiq-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      MONGODB_URI: mongodb://${MONGO_ROOT_USERNAME:-admin}:${MONGO_ROOT_PASSWORD:-statementiq_secure_pass}@mongodb:27017/statementiq?authSource=admin
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY:-}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD:-}
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000,http://localhost
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - statementiq-network
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8080/api/v1/health || exit 1
      interval: 30s
      timeout: 5s
      retries: 3

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: statementiq-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - statementiq-network

volumes:
  mongodb_data:
    driver: local

networks:
  statementiq-network:
    driver: bridge
